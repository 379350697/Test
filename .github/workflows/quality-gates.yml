name: Quality Gates

on:
  pull_request:
  push:
    branches: ["main", "work"]

jobs:
  test-lint-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests with coverage gate
        run: pytest -q

      - name: Run ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy quantx tests

      - name: Run performance smoke checks
        run: pytest -q tests/test_performance_smoke.py

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Dependency vulnerability scan (pip-audit)
        run: python -m pip_audit

      - name: Static security scan (bandit)
        run: python -m bandit -q -r quantx -c .bandit
